<!DOCTYPE html>
<html>
<head>
  <title>COVID Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; }
    .controls { display: flex; gap: 12px; margin-bottom: 1rem; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .chip { background: #eee; padding: 4px 10px; border-radius: 999px; cursor: pointer; }
    .chart-box { position: relative; width: 100%; height: 300px; margin-bottom: 2rem; }
  </style>
</head>
<body>

    const COLORS = ['#2a78d6','#008300','#e87ba4','#eda100','#1baf7a','#eb6834','#4a3aa7','#e34948'];

    // ============================================================
    // 2. POPULATE THE DROPDOWNS
    // ============================================================
    const continentSel = document.getElementById('continentFilter');
    const countrySel = document.getElementById('countrySelect');
    const chipsDiv = document.getElementById('chips');

    // Get unique continents. `new Set()` removes duplicates from an array.
    const continents = [...new Set(DATA.countries.map(c => c.continent))].sort();
    continents.forEach(cont => {
      const opt = document.createElement('option');
      opt.value = cont;
      opt.textContent = cont;
      continentSel.appendChild(opt);
    });

    function populateCountryDropdown(continentFilter) {
      countrySel.innerHTML = ''; // clear old options
      DATA.countries
        .filter(c => continentFilter === 'all' || c.continent === continentFilter)
        .filter(c => DATA.timeseries[c.location]) // only countries we have time series for
        .sort((a, b) => a.location.localeCompare(b.location))
        .forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.location;
          opt.textContent = c.location;
          countrySel.appendChild(opt);
        });
    }
    populateCountryDropdown('all');

    continentSel.addEventListener('change', () => {
      populateCountryDropdown(continentSel.value);
    });

    // ============================================================
    // 3. TRACK WHICH COUNTRIES ARE SELECTED (the "chips" pattern)
    // ============================================================
    let selected = ['United States', 'India', 'Brazil', 'United Kingdom']
      .filter(name => DATA.timeseries[name]); // only keep ones we actually have data for

    function renderChips() {
      chipsDiv.innerHTML = '';
      selected.forEach((name, i) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.style.borderLeft = '4px solid ' + COLORS[i % COLORS.length];
        chip.textContent = name + ' ✕';
        chip.onclick = () => {
          selected = selected.filter(n => n !== name);
          renderChips();
          renderLineCharts();
        };
        chipsDiv.appendChild(chip);
      });
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const val = countrySel.value;
      if (val && !selected.includes(val) && selected.length < 8) {
        selected.push(val);
        renderChips();
        renderLineCharts();
      }
    });

    // ============================================================
    // 4. LINE CHARTS (cases + deaths over time)
    // ============================================================
    let casesChart, deathsChart;

    function buildDatasets(metric) {
      return selected.map((name, i) => {
        const ts = DATA.timeseries[name];
        return {
          label: name,
          data: ts.dates.map((d, idx) => ({ x: d, y: ts[metric][idx] })),
          borderColor: COLORS[i % COLORS.length],
          borderWidth: 2,
          pointRadius: 0
        };
      });
    }

    function renderLineCharts() {
      if (casesChart) casesChart.destroy();
      if (deathsChart) deathsChart.destroy();

      casesChart = new Chart(document.getElementById('casesChart'), {
        type: 'line',
        data: { datasets: buildDatasets('cases_pm') },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'category' } } }
      });

      deathsChart = new Chart(document.getElementById('deathsChart'), {
        type: 'line',
        data: { datasets: buildDatasets('deaths_pm') },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'category' } } }
      });
    }

    // ============================================================
    // 5. SCATTER / BUBBLE CHART (GDP vs deaths, sized by population)
    // ============================================================
    function renderScatter() {
      const points = DATA.countries.filter(c =>
        c.gdp_per_capita != null && c.deaths_pm != null && c.cluster != null
      );

      // group points by cluster so each cluster is its own colored dataset
      const byCluster = {};
      points.forEach(p => {
        if (!byCluster[p.cluster]) byCluster[p.cluster] = [];
        byCluster[p.cluster].push(p);
      });

      const datasets = Object.keys(byCluster).map(cluster => ({
        label: 'Cluster ' + cluster,
        data: byCluster[cluster].map(p => ({
          x: p.gdp_per_capita,
          y: p.deaths_pm,
          r: Math.sqrt(p.population) / 400, // bubble size scales with population
          country: p.location // stash the name so the tooltip can show it
        })),
        backgroundColor: COLORS[cluster % COLORS.length] + 'aa'
      }));

      new Chart(document.getElementById('scatterChart'), {
        type: 'bubble',
        data: { datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { type: 'logarithmic', title: { display: true, text: 'GDP per capita (log)' } } },
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => ctx.raw.country + ': $' + Math.round(ctx.raw.x) + ', ' + Math.round(ctx.raw.y) + '/M deaths'
              }
            }
          }
        }
      });
    }

    // ============================================================
    // 6. TOP 15 BAR CHART
    // ============================================================
    function renderTopChart() {
      const top15 = DATA.countries
        .filter(c => c.deaths_pm != null)
        .sort((a, b) => b.deaths_pm - a.deaths_pm)
        .slice(0, 15)
        .reverse(); // reverse so #1 shows at the top of a horizontal bar chart

      new Chart(document.getElementById('topChart'), {
        type: 'bar',
        data: {
          labels: top15.map(c => c.location),
          datasets: [{ data: top15.map(c => c.deaths_pm), backgroundColor: '#e34948' }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
      });
    }

    // ============================================================
    // 7. INITIAL RENDER — run everything once on page load
    // ============================================================
    renderChips();
    renderLineCharts();
    renderScatter();
    renderTopChart();
  </script>
